plugins {
    id 'net.fabricmc.fabric-loom' version '1.17.11'
    id 'maven-publish'
}

version = (findProperty('aether_version') ?: '0.0.0').toString()
group = project.maven_group

def artifactVersion = project.version.replaceFirst(/(-r\d+)$/, "-${project.minecraft_version}\$1")
if (artifactVersion == project.version) {
    artifactVersion = "${project.version}-${project.minecraft_version}"
}

base {
    archivesName = project.archives_base_name
}

tasks.withType(AbstractArchiveTask).configureEach {
    archiveVersion = artifactVersion
}

repositories {
    maven { url = 'https://maven.fabricmc.net/' }
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    include(implementation("io.netty:netty-handler-proxy:4.1.82.Final"))
    include(implementation("io.netty:netty-codec-socks:4.1.82.Final"))

    def lwjglVersion = '3.4.1'
    implementation "org.lwjgl:lwjgl-nanovg:${lwjglVersion}"
    include "org.lwjgl:lwjgl-nanovg:${lwjglVersion}"
    ['windows', 'linux', 'macos', 'macos-arm64'].each { platform ->
        implementation "org.lwjgl:lwjgl-nanovg:${lwjglVersion}:natives-${platform}"
        include "org.lwjgl:lwjgl-nanovg:${lwjglVersion}:natives-${platform}"
    }

    implementation "com.googlecode.soundlibs:mp3spi:1.9.5.4"
    implementation "com.googlecode.soundlibs:jlayer:1.0.1.4"
    implementation "com.googlecode.soundlibs:tritonus-share:0.3.7.4"
    implementation "net.java.dev.jna:jna:5.17.0"
    implementation "net.java.dev.jna:jna-platform:5.17.0"
    include "com.googlecode.soundlibs:mp3spi:1.9.5.4"
    include "com.googlecode.soundlibs:jlayer:1.0.1.4"
    include "com.googlecode.soundlibs:tritonus-share:0.3.7.4"
    include "net.java.dev.jna:jna:5.17.0"
    include "net.java.dev.jna:jna-platform:5.17.0"
}

def aetherTranslationRepoRawUrl = providers.gradleProperty('aetherTranslationRepoRawUrl')
        .orElse(providers.environmentVariable('AETHER_TRANSLATION_REPO_RAW_URL'))
def aetherTranslationLocales = providers.gradleProperty('aetherTranslationLocales')
        .orElse(providers.environmentVariable('AETHER_TRANSLATION_LOCALES'))
def generatedAetherLangDir = layout.buildDirectory.dir('generated/aether-lang')

tasks.register('fetchAetherLanguagePacks') {
    group = 'resources'
    description = 'Fetches optional Aether language JSON files for inclusion in the mod jar.'

    inputs.property('aetherTranslationRepoRawUrl', aetherTranslationRepoRawUrl.orNull ?: '')
    inputs.property('aetherTranslationLocales', aetherTranslationLocales.orNull ?: '')
    outputs.dir(generatedAetherLangDir)

    doLast {
        File outputRoot = generatedAetherLangDir.get().asFile
        File langDir = new File(outputRoot, 'assets/aether/lang')
        if (outputRoot.exists()) {
            outputRoot.deleteDir()
        }
        langDir.mkdirs()

        String rawBaseUrl = (aetherTranslationRepoRawUrl.orNull ?: '').trim()
        String rawLocales = (aetherTranslationLocales.orNull ?: '').trim()
        if (rawBaseUrl.isEmpty() || rawLocales.isEmpty()) {
            logger.lifecycle('Skipping Aether language pack fetch; set -PaetherTranslationRepoRawUrl and -PaetherTranslationLocales to enable it.')
            return
        }

        String normalizedBaseUrl = rawBaseUrl.endsWith('/') ? rawBaseUrl : rawBaseUrl + '/'
        def jsonSlurper = new groovy.json.JsonSlurper()
        rawLocales.split(',')
                .collect { it.trim() }
                .findAll { !it.isEmpty() }
                .unique()
                .each { locale ->
                    URL url = new URL(normalizedBaseUrl + locale + '.json')
                    File target = new File(langDir, locale + '.json')
                    logger.lifecycle("Fetching Aether language pack ${locale} from ${url}")
                    String text
                    try {
                        text = url.getText('UTF-8')
                        if (text.startsWith('\uFEFF')) {
                            text = text.substring(1)
                        }
                        def parsed = jsonSlurper.parseText(text)
                        if (!(parsed instanceof Map)) {
                            throw new GradleException("Language pack ${locale} must be a JSON object.")
                        }
                    } catch (Exception ex) {
                        throw new GradleException("Failed to fetch or parse Aether language pack ${locale} from ${url}: ${ex.message}", ex)
                    }

                    target.setText(groovy.json.JsonOutput.prettyPrint(text), 'UTF-8')
                }
    }
}

processResources {
    dependsOn tasks.named('fetchAetherLanguagePacks')

    inputs.property 'version', project.version
    inputs.property 'minecraft_version', project.minecraft_version
    inputs.property 'loader_version', project.loader_version

    from(generatedAetherLangDir)

    filesMatching('fabric.mod.json') {
        expand 'version': project.version,
                'minecraft_version': project.minecraft_version,
                'loader_version': project.loader_version
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = 25
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

jar {
    from('LICENSE') {
        rename { "${it}_${project.archives_base_name}" }
    }
}

if (file('local.gradle').exists()) {
    apply from: 'local.gradle'
}
