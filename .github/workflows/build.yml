name: Build and Release

on:
  pull_request:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - "README.md"
      - ".gitignore"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve Release Version
        id: vars
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const content = fs.readFileSync('gradle.properties', 'utf8');
            const match = content.match(/^aether_version\s*=\s*(.+)\s*$/m);
            if (!match) {
              core.setFailed('aether_version was not found in gradle.properties');
              return;
            }

            const baseVersion = match[1].trim().replace(/^[vV]/, '');
            const prefix = `${baseVersion}-r`;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            let maxRevision = 0;
            for (const release of releases) {
              const tag = (release.tag_name || '').trim().replace(/^[vV]/, '');
              if (!tag.startsWith(prefix)) continue;

              const revision = Number.parseInt(tag.slice(prefix.length), 10);
              if (Number.isInteger(revision) && revision > maxRevision) {
                maxRevision = revision;
              }
            }

            const releaseVersion = `${baseVersion}-r${maxRevision + 1}`;
            core.setOutput('base_version', baseVersion);
            core.setOutput('release_version', releaseVersion);
            core.setOutput('release_tag', releaseVersion);

      - name: Build with Gradle
        run: ./gradlew build --no-daemon -Paether_version=${{ steps.vars.outputs.release_version }}

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-${{ steps.vars.outputs.release_version }}
          path: build/libs/*.jar

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.release_tag }}
          name: ${{ steps.vars.outputs.release_version }}
          body: |
            Automated build version: ${{ steps.vars.outputs.release_version }}

            Base version: ${{ steps.vars.outputs.base_version }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Message: ${{ github.event.head_commit.message }}
          files: build/libs/*.jar
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
